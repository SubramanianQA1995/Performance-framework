# =====================================================================
# ITS Performance Framework - DEFAULT / ACTIVE environment
# ---------------------------------------------------------------------
# This is the file the JMX plans read via ${__P(name,default)}.
# To switch environments, either:
#   (a) copy one of config/env/*.properties over this file, OR
#   (b) pass overrides on the CLI:  -Jbase_url=... -Jusers=...
#
# All ITS APIs later replace ONLY these values - no JMX change needed.
# =====================================================================

# ---- Target system under test (SUT) ---------------------------------
env=QA
protocol=https
base_url=restful-booker.herokuapp.com
port=443
basepath=

# ---- Authentication credentials -------------------------------------
auth_user=admin
auth_password=password123
# Pre-computed Basic-auth header value = base64("auth_user:auth_password").
# Sent explicitly on every request (concurrency-safe, no plugin/function needed).
# Regenerate after changing creds, e.g. in PowerShell:
#   [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("admin:password123"))
auth_basic=YWRtaW46cGFzc3dvcmQxMjM=

# ---- Load profile (overridden per scenario / per env) ---------------
users=10
rampup=30
duration=300
loops=-1
startup_delay=0

# ---- Pacing / realism -----------------------------------------------
think_time_min=500
think_time_max=2000
# think_time_range = think_time_max - think_time_min (used by Uniform Random Timer)
think_time_range=1500

# ---- Connection timeouts (ms) ---------------------------------------
connect_timeout=5000
response_timeout=30000

# ---- SLA / assertion thresholds (ms) --------------------------------
sla_auth_ms=2000
sla_create_ms=3000
sla_read_ms=1500
sla_update_ms=3000
sla_delete_ms=2000

# ---- Test data file (filename only -> RedLine13 safe) ---------------
testdata_file=testdata.csv
