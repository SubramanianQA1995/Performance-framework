# =====================================================================
# ITS Performance Framework - JMeter user.properties
# ---------------------------------------------------------------------
# These properties tune the JMeter engine itself. Load at runtime with:
#   jmeter -p config/user.properties -n -t jmx/LoadTest.jmx ...
# On RedLine13 these are set in the test "JMeter Properties" box.
# =====================================================================

# ---- Result log format (CSV is lightest for large distributed runs) -
jmeter.save.saveservice.output_format=csv
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.response_data.on_error=true
jmeter.save.saveservice.samplerData=false
jmeter.save.saveservice.requestHeaders=false
jmeter.save.saveservice.responseHeaders=false
jmeter.save.saveservice.encoding=false
jmeter.save.saveservice.assertions=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.connect_time=true
jmeter.save.saveservice.thread_counts=true
jmeter.save.saveservice.sub_results=false
jmeter.save.saveservice.bytes=true
jmeter.save.saveservice.url=true
jmeter.save.saveservice.hostname=true
jmeter.save.saveservice.thread_name=true
jmeter.save.saveservice.label=true
jmeter.save.saveservice.code=true
jmeter.save.saveservice.message=true
jmeter.save.saveservice.successful=true
jmeter.save.saveservice.timestamp_format=ms
jmeter.save.saveservice.print_field_names=true

# ---- HTML dashboard percentile / apdex configuration ----------------
jmeter.reportgenerator.apdex_satisfied_threshold=500
jmeter.reportgenerator.apdex_tolerated_threshold=1500
jmeter.reportgenerator.overall_granularity=5000
jmeter.reportgenerator.report_title=ITS Performance Test Report
# Percentiles surfaced in the dashboard (P90/P95/P99)
aggregate_rt_pct1=90
aggregate_rt_pct2=95
aggregate_rt_pct3=99

# ---- Engine / connection tuning for high load -----------------------
# Reuse connections and honour keep-alive for realistic browser behaviour
httpclient4.retrycount=0
hc.parameters.file=
http.connection.stalecheck$Boolean=true
httpsampler.ignore_failed_embedded_resources=true
# Larger thread ramp safety
jmeterengine.nongui.maxport=4445
jmeterengine.force.system.exit=true

# ---- Cookie / cache managers (per-thread isolation) -----------------
CookieManager.save.cookies=true
CookieManager.check.cookies=true

# ---- Default result file (overridable on CLI with -l) ---------------
# Keep timestamps in epoch ms so RedLine13 + HTML dashboard parse cleanly

# ---- Summariser (console heartbeat during non-GUI runs) -------------
summariser.name=summary
summariser.interval=30
summariser.log=true
summariser.out=true
